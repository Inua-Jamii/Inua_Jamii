<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INUA JAMII FUND KENYA</title>
  <style>
    /* Style for the error message box */
    #errorWindow {
      display: none; /* Hidden by default */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: red;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      z-index: 9999;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <!-- Error window -->
  <div id="errorWindow"></div>

  <div class="header-image">
    <img src="images.jpg" alt="NYOTA FUND KENYA" />
  </div>
  <div class="container">
    <p class="welcome-text">
      Hi👋,Welcome to INUA JAMII FUNDS KENYA. We are going to take you through some few questions before you receive your funds. <strong>Are you ready for that?</strong>
    </p>
    <div class="buttons">
      <button onclick="nextPage()">Yes</button>
      <button onclick="notReady()">No</button>
    </div>
  </div>

  <script>
    // Function to show error message
    function showError(message) {
      const errorDiv = document.getElementById('errorWindow');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';

      // Hide after 2 seconds
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 2000);
    }

    // Navigation functions
    function nextPage() {
      window.location.href='index2.html';
    }

    function notReady() {
      showError("Please come back when you are ready.");
    }
  </script>
</body>
</html>
